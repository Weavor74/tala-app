name: Docs Lock

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  naming-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .changed-files.txt

      - name: Seam governance gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run governance:seams -- --changed-files-file .changed-files.txt --base-ref "origin/${{ github.base_ref }}"
          else
            npm run governance:seams
          fi

      - name: Heal docs deterministically
        run: npm run docs:heal

      - name: Ensure healed docs are committed
        shell: bash
        run: |
          if ! git diff --quiet -- docs/review/doclock-impact.md; then
            echo "Documentation healing generated uncommitted changes (docs/review/doclock-impact.md)."
            git diff -- docs/review/doclock-impact.md
            exit 1
          fi

      - name: Validate documentation drift
        run: npm run docs:validate

      - name: Gatekeeper naming pass
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run docs:gatekeeper:naming -- --changed-files-file .changed-files.txt --baseline-ref "origin/${{ github.base_ref }}"
          else
            npm run docs:gatekeeper:naming
          fi
