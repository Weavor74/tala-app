name: Docs Lock

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  naming-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate naming contract drift
        run: npm run docs:validate:naming

      - name: Gatekeeper naming pass
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .changed-files.txt
            npm run docs:gatekeeper:naming -- --changed-files-file .changed-files.txt --baseline-ref "origin/${{ github.base_ref }}"
          else
            npm run docs:gatekeeper:naming
          fi
